No//Note:ini File settings will be overwritten  ,if same parameter is passed by  KfxConverter.bat 

[GENERAL]
//original file will be saved in this path, if document conversion is failed and path is valid
OriginalDocumentFolder=""
//EnablePageHeader=false will turn off the page number on top of each page
EnablePageHeader=true
//specify encoding type of a .html, .mht, .eml or .msg files, if not specified in the the input file
EncodingType=UTF-8
//EnableAttachmentList=false will remove the message header attachment list line from the output file
EnableAttachmentList=true

//DebugLog=true will add additional trace statements in case of Errors or Exception.
DebugLog=false

[EML2PDF]
//Margin in CentiMeters 
EnableMargin=false
LeftMargin=3.175      
RightMargin=3.175 
TopMargin=2.54
BottomMargin=2.54
//Page number distance from header in CentiMeters.Effective only if EnableMargin is set to True
PgNmDistFromHeader=1.3
//Possible values for ResizeLargeImages
//0 - NoImageResize - images are not resized
//1 - ResizeImagesBasedOnSectionSize - this compares the image size with the section size of the word document and it resizes the image if image size > section size  
//2 - ResizeImageBasedOnRatio - It considers the free space based on an inline image or floating image, then calculates the ratio to fit the page size based on which side is longer and then resizes the images.
ResizeLargeImages=2
//fits the table to page width
FitTableWidthToPage=true
//If set to false,  AutoFit option is disabled and preferred width will be removed from the table.
//The widths of the cells remain as they are specified by their Width properties.
FixedColumnWidths=false
//Set the paper orientation.Default -1, for Landscape 0, for Portrait 1
PaperOrientation=-1
//Set true to disable Aspose API to parse conditional comments in the input document. 
DisableVMLSupport=false
//If set to true, redundant nested canvases and empty canvases are removed, also neighbor glyphs with the same formatting are concatenated 
RemoveRedundantObjects=false
//If set to true, sets the preferred width for the table to 100%.
FitTablesToWindow=false

//if font size enabled...all the text in the converted pdf file will be of same font size 
EnableFontSize=false
FontSize=12
//If DateFormat is empty,it will use the default format.
DateFormat=""
//if font type enabled...all the text in the converted pdf file will be of same font type
EnableFontType=false
FontType=Arial Unicode MS

//Dynamic pdf to static ,pdf to pdfa 
[PDF2PDF]
//Adobe LiveCycle web service timeout in seconds.
ALCWebServiceTimeout=1200

[TEXT2PDF]
FontType=Arial Unicode MS

[EXCEL2PDF]
//If true, all the columns are set to one page.
FitAllColumnsToOnePage=true
//Set the paper orientation.Default -1, for Landscape 0, for Portrait 1
PaperOrientation=-1
//The following are permissible values for paper size: PaperLetter, PaperLegal, PaperA3, PaperA4, PaperA5
//Provide PaperSize=Default for disabling papersize setting
PaperSize=Default
//Set the ConvertSheets
//permissible values for ConvertSheets: All, Active,1 for FirstPage,2 for SecondPage,etc..
ConvertSheets=All
//Margin in CentiMeters
EnableMargin=false
BottomMargin=1
LeftMargin=1    
RightMargin=1
TopMargin=1
//Possible valies for PrintArea: 
//Inherit - (default behavoiur) Inherit from the Excel Worksheet. If a print area is defined in the Worksheet it will be considered when rendering the document.
//Disable - Disable the print area. If a print area is defined in the Worksheet it will be ignored .
PrintArea=Inherit
//If true, 'AutoFit Column Width' setting will be applied.
EnableAutoFitColumns=false
//If set to true, re-calculates all the formulas in the worksheet 
RecalculateOnOpen=false

[HTML2PDF]
//Margin in CentiMeters 
EnableMargin=false
LeftMargin=0.3528      
RightMargin=0.3528
TopMargin=2.54
BottomMargin=2.54
//Possible values for ResizeLargeImages
//0 - NoImageResize - images are not resized
//1 - ResizeImagesBasedOnSectionSize - this compares the image size with the section size of the word document and it resizes the image if image size > section size  
//2 - ResizeImageBasedOnRatio - It considers the free space based on an inline image or floating image, then calculates the ratio to fit the page size based on which side is longer and then resizes the images.
ResizeLargeImages=0
//To apply Scale Factor percentage to the ratio for Resizing large images. Possible values 1 to 100
ResizeScaleFactorPercent=100
FixedColumnWidths=false
//fits the table to page width
FitTableWidthToPage=true
//If set to true, redundant nested canvases and empty canvases are removed, also neighbor glyphs with the same formatting are concatenated 
RemoveRedundantObjects=false
//If set to true, sets the preferred width for the table to 100%.
FitTablesToWindow=false
//If set to false, the Aspose API UpdateTableLayout is not used
EnableTableLayout=true

[MHT2PDF]
//Margin in CentiMeters 
EnableMargin=false
LeftMargin=3.175      
RightMargin=3.175 
TopMargin=2.54
BottomMargin=2.54
//If set to true, redundant nested canvases and empty canvases are removed, also neighbor glyphs with the same formatting are concatenated 
RemoveRedundantObjects=false
//If set to true, sets the preferred width for the table to 100%.
FitTablesToWindow=false

//If false KfxConverter will not load the externally linked resources while converting .eml or msg and html files
[EXTERNALRESOURCELOADING]
LoadExternalResources=false

[PDF2PDFA]
//User can configure which conversion errors shall be reported.
//Define which operations should not result in document conversion error.
//4 = allow visual differences,
//8 = allow name collisions of colorants,
//16 = allow removing optional content groups (layers),
//32 = allow removing transparency,
//64 = allow removing embedded files,
//128 = allow removing non convertible XMP metadata,
//512 = allow removing of  signatures while normalizing the signed document,
//4096 = allow normalizing corrupt input document,
//16384 = allow similar font substitution,
//32768 = allow removing interactive elements such as actions or annotations.
//65536 = remove logical structure information.
//Permissible values for ConfigureConversionErrors : any number from the list or result of OR operation of any of the numbers -  4, 8 , 16, 32, 64, 128, 512, 4096, 16384, 32768, 65536
AllowedErrors=160
AllowDowngrade=true

[DOC2HTML]
//enables the embedding of Font resources into the HTML
EmbedFonts=false
//enables the embedding of Image data into the HTML
EmbedImages=false                          
//if enabled keeps external Image URLs intact to not send images in the email but let the client load it from external web server
OriginalImageUrls=false

[DOC2PDF]
// enables all revisions to be accepted in the document
AcceptAllRevisions=false
// enables removal of all comments in the document
RemoveComments=false

//If set to true, enables flattening of XFA forms using Legacy engine. 
//Note: flattening XFA forms using tools other than Adobe Live Cycle might lead to unpredictable results in some cases and is not supported. 
//Changing this parameters implies that customers are using this feature on their own responsibility
[FLATTENXFA]
TryFlatteningXFAWithoutALC=false

//SkipConversion when input PDF is a valid PDF/A or input PDF has attachments or input PDF is signed or input PDF has unknown fonts
[SKIPCONVERSION]
InputPDFisaValidPDFA=false
InputPDFhasAttachments=false
InputPDFisSigned=false
InputPDFhasUnknownFonts=false